<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#D4AF37;--gold-hi:#f1d592;--gold-lo:#8a6d3b;--gold-dk:#b8860b;--bg:#050505;--text:#ccc;--glow:rgba(212,175,55,0.12)}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;display:flex;align-items:center;justify-content:center}
body.crt::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px);pointer-events:none;z-index:9999}
.dash{display:grid;grid-template-columns:auto 320px;max-height:100vh}
.main{display:flex;align-items:center;justify-content:center;padding:24px;position:relative;background:radial-gradient(ellipse at center,#0a0a0a,#030303)}
.main::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.015) 0%,transparent 30%,transparent 70%,rgba(255,255,255,0.01) 100%);pointer-events:none}
.frame{position:relative;line-height:0;box-sizing:content-box;width:1020px;height:612px;border:4px solid;border-image:linear-gradient(145deg,#3a2e14,var(--gold-lo),var(--gold-hi),var(--gold),var(--gold-dk),#3a2e14) 1;box-shadow:0 0 0 1px #1a1508,0 0 30px rgba(212,175,55,0.06);flex-shrink:0}
.frame canvas{display:block;width:1020px;height:612px;image-rendering:pixelated;image-rendering:crisp-edges}
.frame .scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(0,0,0,0.05) 1px,rgba(0,0,0,0.05) 2px);pointer-events:none}
.sidebar{background:linear-gradient(180deg,#080808,#040404);border-left:2px solid #1a1508;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;max-height:100vh;scrollbar-width:thin;scrollbar-color:#222 #080808}
.sidebar::-webkit-scrollbar{width:5px}
.sidebar::-webkit-scrollbar-track{background:#080808}
.sidebar::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
.sb-head{padding:14px 16px 10px;text-align:center;border-bottom:1px solid #111;background:linear-gradient(180deg,#0c0c0c,#060606)}
.sb-head .hdr-sub{font-family:'Orbitron',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.25em;color:#888;margin-bottom:4px}
.sb-head .inst{font-size:10px;color:#777;margin-top:5px;letter-spacing:0.08em;line-height:1.5}
.sec{padding:8px 14px;border-bottom:1px solid #0e0e0e}
.sec-label{margin-bottom:6px;line-height:0}
.sec-label canvas{image-rendering:pixelated;image-rendering:crisp-edges}
.bg-row{display:flex;gap:4px;flex-wrap:wrap}
.bg-t{width:54px;height:32px;border:2px solid #1a1a1a;border-radius:1px;cursor:pointer;opacity:0.35;transition:opacity 0.15s,border-color 0.15s;object-fit:cover}
.bg-t:hover{opacity:0.65;border-color:#444}
.bg-t.on{opacity:1;border-color:var(--gold);box-shadow:0 0 8px var(--glow)}
select,textarea{width:100%;background:#060606;color:var(--text);border:1px solid #1a1a1a;border-radius:1px;padding:7px 9px;font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;transition:border-color 0.15s}
select:focus,textarea:focus{border-color:var(--gold-dk)}
textarea{resize:vertical;min-height:48px;max-height:100px}
.sr{display:flex;align-items:center;gap:8px;margin-top:2px}
.sr input[type="range"]{flex:1;accent-color:var(--gold);height:3px}
.sr span{font-size:10px;color:#888;min-width:36px;text-align:right}
.sl{font-size:9px;color:#777;letter-spacing:0.1em;margin-bottom:2px}
.chk{font-size:11px;color:#999;cursor:pointer;display:flex;align-items:center;gap:6px}
.chk input{accent-color:var(--gold);width:13px;height:13px;cursor:pointer}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 10px;border:1px solid #1a1a1a;border-radius:1px;background:#080808;color:#999;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;transition:background 0.12s,border-color 0.12s,color 0.12s;white-space:nowrap}
.btn:hover{background:#0e0e0e;border-color:#333;color:#ccc}
.btn:active{transform:scale(0.97)}
.btn.go{border-color:var(--gold-dk);color:var(--gold);background:rgba(212,175,55,0.04)}
.btn.go:hover{background:rgba(212,175,55,0.1)}
.btn.stop{border-color:#4a1515;color:#b44}
.btn.wide{grid-column:span 2}
.rec-badge{display:none;position:absolute;top:24px;right:24px;background:#a00;color:#fff;font-size:10px;font-family:'Share Tech Mono',monospace;padding:3px 8px;border-radius:2px;letter-spacing:0.1em;animation:recblink 1s ease-in-out infinite;z-index:10}
@keyframes recblink{0%,100%{opacity:1}50%{opacity:0.4}}
.foot{padding:6px 14px;font-size:9px;color:#444;text-align:center;letter-spacing:0.08em;margin-top:auto}

/* Audio */
function ensureAudio(){
  if(audioCtx){
    if(audioCtx.state==="suspended")try{audioCtx.resume()}catch(e){}
    return Promise.resolve();
  }
  return new Promise(function(resolve){
    try{
      audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      gainNode=audioCtx.createGain();
      gainNode.gain.value=masterVolume;
      gainNode.connect(audioCtx.destination);
      Promise.all([
        fetch(AUDIO_SRC.teletype).then(function(r){return r.arrayBuffer()}),
        fetch(AUDIO_SRC.push).then(function(r){return r.arrayBuffer()})
      ]).then(function(bufs){
        return Promise.all([
          audioCtx.decodeAudioData(bufs[0].slice(0)),
          audioCtx.decodeAudioData(bufs[1].slice(0))
        ]);
      }).then(function(decoded){
        bufTeletype=decoded[0];
        bufPush=decoded[1];
        resolve();
      });
    }catch(e){console.error("Audio init:",e);resolve()}
  });
}

function playSound(buf){
  if(!audioCtx||!buf||!gainNode)return;
  if(audioCtx.state==="suspended")audioCtx.resume();
  try{var s=audioCtx.createBufferSource();s.buffer=buf;s.connect(gainNode);s.start()}catch(e){}
}

    img.src=url;
  });

  return Promise.all(p).then(function(imgs){
    bgImages=imgs;
    return Promise.all([
      loadImage("assets/FONTBIG_sheet.png"),
      loadImage("assets/FONTSML_sheet.png")
    ]);
  }).then(function(sheets){
    fontSheetBig=sheets[0];
    fontSheetSml=sheets[1];
    renderMDKHeader();
    renderSmlLabel("BACKGROUND",$("lblBg"));
    renderSmlLabel("PRESETS",$("lblPre"));
    renderSmlLabel("MESSAGE",$("lblMsg"));
    buildBgPicker();
    buildPresetDropdown();
    restoreFromHash();
    renderCurrent();
  });
}

/* Header + labels */
function renderMDKHeader(){
  var hdr=$("hdrCvs"),hctx=hdr.getContext("2d"),fd=FONT_BIG;
  var x=0;
  [77,68,75].forEach(function(code){
    var g=fd.glyphs[code];
    var col=code%16,row=Math.floor(code/16);
    hctx.drawImage(fontSheetBig,1+col*fd.cw,row*fd.ch+(fd.ch-2-g.h),g.w,g.h,x,0,g.w,g.h);
    x+=g.xa;
  });
}

function renderSmlLabel(text,container){
  var fd=FONT_SML,SML_REF_H=13;
  var totalW=0;
  for(var i=0;i<text.length;i++){
    var g=fd.glyphs[text.charCodeAt(i)];
    if(!g)continue;
    totalW+=(i<text.length-1)?g.xa:g.w;
  }
  var cvs=document.createElement("canvas");
  cvs.width=totalW;
  cvs.height=SML_REF_H+4;
  cvs.style.height=Math.round((SML_REF_H+4)*1.3)+"px";
  cvs.style.display="block";
  var ctx=cvs.getContext("2d");
  var x=0;
  for(var i=0;i<text.length;i++){
    var code=text.charCodeAt(i);
    var g=fd.glyphs[code];
    if(!g)continue;
    var col=code%16,row=Math.floor(code/16);
    ctx.drawImage(fontSheetSml,1+col*fd.cw,row*fd.ch+(fd.ch-2-g.h),g.w,g.h,
                  x,(SML_REF_H-g.h)+g.vs,g.w,g.h);
    x+=g.xa;
  }
  container.appendChild(cvs);
}

/* Presets */
function buildPresetDropdown(){
  var groups={
    "Level 1 \u2013 Laguna Beach":["BRIEF1","DEB1S","DEB1F","DEB1SS","DEB1SF","DEB1FS"],
    "Level 2 \u2013 Lindfield":["BRIEF2","DEB2S","DEB2F","DEB2SS","DEB2SF","DEB2FS"],
    "Level 3 \u2013 Livingston":["BRIEF3","DEB3S","DEB3F","DEB3SS","DEB3SF","DEB3FS"],
    "Level 4 \u2013 Kirkcaldy":["BRIEF4","DEB4S","DEB4F","DEB4SS","DEB4SF","DEB4FS"],
    "Level 5 \u2013 Sparrow Pit":["BRIEF5"]
  };
  Object.keys(groups).forEach(function(label){
    var keys=groups[label].filter(function(k){return PRESETS[k]});
    if(!keys.length)return;
    var og=document.createElement("optgroup");
    og.label=label;
    keys.forEach(function(k){
      var o=document.createElement("option");
      o.value=k;
      var tag=k.indexOf("BRIEF")>=0?"Briefing":k.slice(-2)==="SS"?"Success+Bonus":
        k.slice(-2)==="SF"?"Success+Fail":k.slice(-2)==="FS"?"Fail+Shot":
        k.slice(-1)==="S"?"Success":"Fail";
      o.textContent=k+" \u2014 "+tag;
      og.appendChild(o);
    });
    $presetSel.appendChild(og);
  });
  if(PRESETS["BRIEF1"]){
    $textIn.value=PRESETS["BRIEF1"];
    $presetSel.value="BRIEF1";
  }
}

/* BG picker */
function buildBgPicker(){
  bgImages.forEach(function(img,i){
    var t=document.createElement("img");
    t.src=img.src;
    t.className="bg-t"+(i===0?" on":"");
    t.title="Level "+(i+1);
    t.addEventListener("click",function(){
      $bgPicker.querySelectorAll(".bg-t").forEach(function(el){el.classList.remove("on")});
      t.classList.add("on");
      currentBg=i;
      renderCurrent();
      updateHash();
      clickSound();
    });
    $bgPicker.appendChild(t);
  });
}

/* URL hash */
function updateHash(){
  try{
    var state={b:currentBg,t:$textIn.value,d:debriefFrame};
    var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(state))));
    history.replaceState(null,"","#"+encoded);
  }catch(e){}
}

function restoreFromHash(){
  try{
    var hash=location.hash.slice(1);
    if(!hash)return;
    var state=JSON.parse(decodeURIComponent(escape(atob(hash))));
    if(typeof state.b==="number"&&state.b>=0&&state.b<5)currentBg=state.b;
    if(typeof state.t==="string")$textIn.value=state.t;
    if(typeof state.d==="boolean"){debriefFrame=state.d;$debCb.checked=state.d}
    setTimeout(function(){
      $bgPicker.querySelectorAll(".bg-t").forEach(function(el,i){
        el.classList.toggle("on",i===currentBg);
      });
      $presetSel.value="";
      Object.keys(PRESETS).forEach(function(k){
        if(PRESETS[k]===$textIn.value)$presetSel.value=k;
      });
    },0);
  }catch(e){}
}

/* Font rendering */
function glyphSrc(code){
  var g=FONT_BIG.glyphs[code];
  if(!g)return null;
  var col=code%16,row=Math.floor(code/16);
  return{sx:1+col*FONT_BIG.cw,sy:row*FONT_BIG.ch+(FONT_BIG.ch-2-g.h),w:g.w,h:g.h,xa:g.xa,vs:g.vs};
}

function measureLine(line){
  var w=0;
  for(var i=0;i<line.length;i++){
    var c=line.charCodeAt(i);
    if(c===32){w+=SPACE_W;continue}
    var g=FONT_BIG.glyphs[c];
    if(g)w+=g.xa;
  }
  return w;
}

function wrapText(text){
  var rawLines=text.replace(/\r\n/g,"\n").replace(/\\n/g,"\n").split("\n");
  var out=[];
  rawLines.forEach(function(raw){
    var words=raw.split(" ");
    var cur="",curW=0;
    words.forEach(function(word){
      var ww=measureLine(word);
      var add=cur.length>0?SPACE_W+ww:ww;
      if(curW+add<=TEXT_AREA_W||cur.length===0){
        cur=cur.length>0?cur+" "+word:word;
        curW+=add;
      }else{out.push(cur);cur=word;curW=ww}
    });
    out.push(cur);
  });
  return out;
}

function drawGlyphString(str,cx,cy){
  var w=measureLine(str);
  var x=cx-Math.floor(w/2);
  for(var i=0;i<str.length;i++){
    var ch=str.charCodeAt(i);
    if(ch===32){x+=SPACE_W;continue}
    var g=glyphSrc(ch);
    if(g){
      $ctx.drawImage(fontSheetBig,g.sx,g.sy,g.w,g.h,x,cy+(REF_H-g.h)+g.vs,g.w,g.h);
      x+=g.xa;
    }
  }
}

/* Canvas drawing */
function drawBackground(){
  if(bgImages[currentBg])$ctx.drawImage(bgImages[currentBg],0,0,CVS_W,CVS_H);
  else{$ctx.fillStyle="#000";$ctx.fillRect(0,0,CVS_W,CVS_H)}
}

function renderText(text,charLimit){
  if(!fontSheetBig)return;
  var lines=wrapText(text);
  var startY=Math.floor((CVS_H-lines.length*LINE_H)/3)-Math.floor(REF_H/2);
  var cc=0;
  for(var li=0;li<lines.length;li++){
    var line=lines[li],lw=measureLine(line);
    var x=TEXT_LEFT+Math.floor((TEXT_AREA_W-lw)/2);
    var y=startY+li*LINE_H;
    if(y+REF_H<0||y>CVS_H){cc+=line.length+1;continue}
    for(var ci=0;ci<line.length;ci++){
      if(charLimit!==undefined&&cc>=charLimit)return;
      var ch=line.charCodeAt(ci);
      if(ch===32){x+=SPACE_W;cc++;continue}
      var g=glyphSrc(ch);
      if(g){$ctx.drawImage(fontSheetBig,g.sx,g.sy,g.w,g.h,x,y+(REF_H-g.h)+g.vs,g.w,g.h);x+=g.xa}
      cc++;
    }
    if(charLimit!==undefined)cc++;
  }
}

var DEB_HEADER="Debriefing";
var DEB_FOOTER="More...";

function renderDebriefOverlay(headerChars,footerChars){
  if(!debriefFrame||!fontSheetBig)return;
  var hStr=(headerChars===undefined)?DEB_HEADER:DEB_HEADER.slice(0,headerChars);
  var fStr=(footerChars===undefined)?DEB_FOOTER:DEB_FOOTER.slice(0,footerChars);
  if(hStr.length)drawGlyphString(hStr,CVS_W/2,4);
  if(fStr.length)drawGlyphString(fStr,CVS_W/2,CVS_H-REF_H-8);
}

function renderCurrent(){
  drawBackground();
  var text=$textIn.value;
  if(text.trim())renderText(text);
  renderDebriefOverlay();
}

/* Typewriter with jitter */
function buildCharMap(text){
  var lines=wrapText(text);
  var map=[];
  lines.forEach(function(line){
    for(var i=0;i<line.length;i++)map.push(true);
    map.push(false);
  });
  return map;
}

function jitter(){return typeSpeed+Math.floor(Math.random()*21)-10}

/* Fade-in helper */
function applyFadeAlpha(alpha){
  if(alpha<=0)return;
  $ctx.fillStyle="rgba(0,0,0,"+alpha+")";
  $ctx.fillRect(0,0,CVS_W,CVS_H);
}

var fadeRafId=null;
function cancelFade(){if(fadeRafId){cancelAnimationFrame(fadeRafId);fadeRafId=null}}

function fadeIn(duration,renderFrame,onDone){
  cancelFade();
  var t0=performance.now();
  function frame(now){
    var t=Math.min((now-t0)/duration,1);
    renderFrame();
    applyFadeAlpha(1-t);
    if(t<1){fadeRafId=requestAnimationFrame(frame)}
    else{fadeRafId=null;if(onDone)onDone();}
  }
  fadeRafId=requestAnimationFrame(frame);
}

/* 3-phase typed sequence: header → body → footer
   onFrame(delay): called after each canvas draw so caller can capture the frame
   onDone: called when all phases complete */
var cancelSequence=null;

function runTypedSequence(text,onFrame,onDone){
  var charMap=buildCharMap(text);
  var bodyTotal=charMap.length;
  var hTotal=debriefFrame?DEB_HEADER.length:0;
  var fTotal=debriefFrame?DEB_FOOTER.length:0;
  var phase=0;
  var idx=0;
  var cancelled=false;

  function renderState(hChars,bodyIdx,fChars){
    drawBackground();
    if(bodyIdx>0)renderText(text,bodyIdx);
    if(debriefFrame)renderDebriefOverlay(hChars,fChars);
  }

  function tick(){
    if(cancelled)return;
    idx++;
    var delay=jitter();
    if(phase===0){
      renderState(idx,0,0);
      playSound(bufTeletype);
      if(onFrame)onFrame(delay);
      if(idx>=hTotal){phase=1;idx=0;animTimer=setTimeout(tick,delay);}
      else{animTimer=setTimeout(tick,delay);}
    } else if(phase===1){
      renderState(hTotal,idx,0);
      if(charMap[idx-1])playSound(bufTeletype);
      if(onFrame)onFrame(delay);
      if(idx>=bodyTotal){
        phase=2;idx=0;
        if(fTotal>0){animTimer=setTimeout(tick,delay);}
        else{if(onDone)onDone();}
      } else {animTimer=setTimeout(tick,delay);}
    } else {
      renderState(hTotal,bodyTotal,idx);
      playSound(bufTeletype);
      if(onFrame)onFrame(delay);
      if(idx>=fTotal){if(onDone)onDone();}
      else{animTimer=setTimeout(tick,delay);}
    }
  }

  renderState(0,0,0);
  if(onFrame)onFrame(jitter());
  if(hTotal===0){phase=1;}
  animTimer=setTimeout(tick,jitter());

  return function cancel(){
    cancelled=true;
    if(animTimer){clearTimeout(animTimer);animTimer=null}
  };
}

function startAnimation(){
  var text=$textIn.value;
  if(!text.trim())return;
  ensureAudio().then(function(){
    stopAnimation();cancelWipe();cancelFade();
    $bAnim.disabled=true;$bStop.disabled=false;

    var initialRender=function(){
      drawBackground();
      if(debriefFrame)renderDebriefOverlay(0,0);
    };
    initialRender();
    applyFadeAlpha(1);

    fadeIn(600,initialRender,function(){
      cancelSequence=runTypedSequence(text,null,function(){
        $bAnim.disabled=false;$bStop.disabled=true;
        cancelSequence=null;
        renderCurrent();
      });
    });
  });
}

function stopAnimation(){
  cancelFade();
  if(cancelSequence){cancelSequence();cancelSequence=null}
  if(animTimer){clearTimeout(animTimer);animTimer=null}
  $bAnim.disabled=false;$bStop.disabled=true;
  renderCurrent();
}

/* Wipe board — fade to black */
function cancelWipe(){if(wipeRafId){cancelAnimationFrame(wipeRafId);wipeRafId=null}}

function wipeBoard(){
  var text=$textIn.value;
  if(!text.trim())return;
  stopAnimation();cancelWipe();
  var duration=2000,t0=performance.now();
  function frame(now){
    var t=Math.min((now-t0)/duration,1);
    drawBackground();
    renderText(text);
    renderDebriefOverlay();
    $ctx.fillStyle="rgba(0,0,0,"+t+")";
    $ctx.fillRect(0,0,CVS_W,CVS_H);
    if(t<1)wipeRafId=requestAnimationFrame(frame);
    else wipeRafId=null;
  }
  wipeRafId=requestAnimationFrame(frame);
}

/* GIF export — fully async, mirrors live animation:
   fade-in → type header → type body → type footer → hold → wipe → render */
function exportGif(){
  if(gifRecording||typeof GIF==="undefined")return;
  var text=$textIn.value;
  if(!text.trim())return;
  gifRecording=true;
  stopAnimation();cancelWipe();cancelFade();
  $bGif.disabled=true;
  $recBadge.style.display="block";

  var gif=new GIF({
    workers:2,quality:10,width:CVS_W,height:CVS_H,
    workerScript:"assets/gif.worker.js"
  });

  function snap(delay){gif.addFrame($ctx,{copy:true,delay:delay});}

  /* Step 3: wipe to black, then finalize */
  function doWipe(){
    var WIPE_STEPS=20,WIPE_DELAY=Math.round(1500/WIPE_STEPS);
    var w=0;
    function wipeStep(){
      drawBackground();
      renderText(text);
      renderDebriefOverlay();
      applyFadeAlpha(w/WIPE_STEPS);
      snap(WIPE_DELAY);
      w++;
      if(w<=WIPE_STEPS){setTimeout(wipeStep,WIPE_DELAY);}
      else{finalize();}
    }
    wipeStep();
  }

  /* Step 2: hold the complete frame, then wipe */
  function doHold(){
    snap(1500);
    setTimeout(doWipe,1500);
  }

  /* Step 1: typed sequence, capture each frame */
  function doSequence(){
    cancelSequence=runTypedSequence(text,function(delay){
      snap(delay);
    },function(){
      cancelSequence=null;
      /* capture the final complete frame */
      doHold();
    });
  }

  /* Step 0: fade in from black */
  function doFadeIn(){
    var FADE_STEPS=12,FADE_DELAY=Math.round(600/FADE_STEPS);
    var f=0;
    var initialRender=function(){
      drawBackground();
      if(debriefFrame)renderDebriefOverlay(0,0);
    };
    function fadeStep(){
      initialRender();
      applyFadeAlpha(1-(f/FADE_STEPS));
      snap(FADE_DELAY);
      f++;
      if(f<=FADE_STEPS){setTimeout(fadeStep,FADE_DELAY);}
      else{doSequence();}
    }
    fadeStep();
  }

  function finalize(){
    gif.on("finished",function(blob){
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=url;a.download="mdk_debrief.gif";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url)},1000);
      gifRecording=false;$bGif.disabled=false;
      $recBadge.style.display="none";
      renderCurrent();
    });
    gif.render();
  }

  ensureAudio().then(doFadeIn);
}

/* Events */
$presetSel.addEventListener("change",function(e){
  var key=e.target.value;
  if(key&&PRESETS[key]){
    $textIn.value=PRESETS[key];
    var isDeb=key.indexOf("DEB")===0;
    debriefFrame=isDeb;$debCb.checked=isDeb;
  }
  stopAnimation();cancelWipe();renderCurrent();updateHash();
  clickSound();
});

$textIn.addEventListener("input",function(){
  $presetSel.value="";
  if(!animTimer)renderCurrent();
  updateHash();
});

$debCb.addEventListener("change",function(){
  debriefFrame=$debCb.checked;
  if(!animTimer)renderCurrent();
  updateHash();
  clickSound();
});

$volR.addEventListener("input",function(){
  masterVolume=+$volR.value/100;
  $volL.textContent=$volR.value+"%";
  if(gainNode)gainNode.gain.value=masterVolume;
});

$crtCb.addEventListener("change",function(){
  document.body.classList.toggle("crt",$crtCb.checked);
  $scanlines.style.display=$crtCb.checked?"":"none";
  clickSound();
});

$bAnim.addEventListener("click",function(){startAnimation()});
$bStop.addEventListener("click",function(){stopAnimation();clickSound()});
$bWipe.addEventListener("click",function(){clickSound();wipeBoard()});
$bGif.addEventListener("click",function(){exportGif()});

$bSave.addEventListener("click",function(){
  clickSound();
  stopAnimation();cancelWipe();renderCurrent();
  $cvs.toBlob(function(blob){
    if(!blob)return;
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download="mdk_debrief.png";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url)},1000);
  },"image/png");
});

$bShare.addEventListener("click",function(){
  updateHash();
  if(navigator.clipboard){
    navigator.clipboard.writeText(location.href).then(function(){
      $bShare.textContent="\u2713 Copied!";
      setTimeout(function(){$bShare.textContent="\uD83D\uDD17 Copy Share Link"},1500);
    });
  }else{
    prompt("Copy this link:",location.href);
  }
  clickSound();
});

/* Boot */
loadAssets().catch(function(){
  $ctx.fillStyle="#000";$ctx.fillRect(0,0,CVS_W,CVS_H);
  $ctx.fillStyle="#D4AF37";$ctx.font="14px monospace";
  $ctx.fillText("Failed to load assets.",180,170);
  $ctx.fillText("Ensure /assets/ folder exists.",155,195);
});
</script>
</body>
